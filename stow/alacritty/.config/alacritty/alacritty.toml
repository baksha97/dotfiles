
[bell]
animation = "EaseOutExpo"
duration = 0

[colors]
draw_bold_text_with_bright_colors = true

[cursor.style]
shape = "Block"
blinking = "Off"

[cursor]
unfocused_hollow = false

[debug]
render_timer = false

[env]
TERM = "xterm-256color"

[window]
decorations = "full"
dynamic_padding = false
dynamic_title = true
opacity = 1.0
option_as_alt = "Both"

[window.padding]
x = 25
y = 20

[font]
size = 16.0

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Heavy"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Heavy Italic"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Medium Italic"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Medium"

[[hints.enabled]]
command = { program = "/bin/sh", args = ["-c", "case \"$(uname)\" in Darwin) open \"$0\" ;; *) xdg-open \"$0\" ;; esac"] }
hyperlinks = true
post_processing = true
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-<>\"\\s{-}\\^⟨⟩`]+"

[hints.enabled.binding]
key = "U"
mods = "Control|Shift"

[hints.enabled.mouse]
enabled = true
mods = "None"

[keyboard]
bindings = [
    { key = "K", mods = "Super", chars = "\u000C" },
    { key = "Left",  mods = "Alt",         chars = "\u001Bb" },
    { key = "Right", mods = "Alt",         chars = "\u001Bf" },
    { key = "Left",  mods = "Alt|Shift",   chars = "\u001B\u001B[D" },
    { key = "Right", mods = "Alt|Shift",   chars = "\u001B\u001B[C" },
    { key = "Back",  mods = "Super",       chars = "\u0015" },
    { key = "Left",  mods = "Super",       chars = "\u0001" },
    { key = "Right", mods = "Super",       chars = "\u0005" },
]

[scrolling]
history = 100000

[general]
live_config_reload = true
import = [
#    "~/.config/alacritty/themes/themes/nightfly.toml",
#    "~/.config/alacritty/themes/themes/ubuntu.toml",
#    "~/.config/alacritty/themes/themes/tomorrow_night_bright.toml",
]
